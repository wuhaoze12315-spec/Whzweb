<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎂 生日快乐 · 挚爱珍藏</title>
    <!-- Google Fonts 手写字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- canvas-confetti 库（用于烟花效果） -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #fff5e6 0%, #ffe0c4 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 2rem 1rem;
            color: #b45a3b;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景流动光晕 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(255,220,190,0.4) 0%, rgba(255,240,220,0) 70%);
            pointer-events: none;
            z-index: -1;
            animation: slowMove 20s infinite alternate;
        }

        @keyframes slowMove {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(2%, 3%); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* 头部区域 */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease;
        }

        .hero h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #ff8c5a, #ff6b3d);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            font-family: 'Kalam', cursive;
        }

        .hero .sub {
            font-size: 1.2rem;
            color: #d98c5f;
            border-top: 2px solid #ffe0cc;
            display: inline-block;
            padding-top: 0.8rem;
            margin-top: 0.5rem;
        }

        .cake-icon {
            font-size: 2rem;
            margin: 1rem 0;
        }

        /* 倒计时样式 */
        .countdown {
            margin-top: 20px;
            font-size: 1rem;
            background: rgba(255, 240, 230, 0.9);
            display: inline-block;
            padding: 8px 18px;
            border-radius: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            font-weight: 500;
        }

        /* 时间轴 */
        .timeline {
            max-width: 600px;
            margin: 40px auto;
            background: rgba(255,245,235,0.8);
            border-radius: 48px;
            padding: 20px 25px;
            text-align: center;
            backdrop-filter: blur(2px);
        }
        .timeline h3 {
            font-size: 1.4rem;
            color: #e07a4f;
            margin-bottom: 15px;
            font-family: 'Kalam', cursive;
        }
        .milestone {
            margin: 12px 0;
            font-size: 1rem;
            border-left: 3px solid #ffaa88;
            padding-left: 20px;
            text-align: left;
            background: rgba(255,255,245,0.5);
            border-radius: 20px;
            transition: 0.2s;
        }
        .milestone:hover {
            background: #fff5ea;
            transform: translateX(5px);
        }

        /* 相册网格 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .card {
            background: rgba(255, 248, 240, 0.95);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.1);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            border: 1px solid #ffefdf;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            background: white;
            box-shadow: 0 28px 34px -14px rgba(0, 0, 0, 0.2);
        }

        .card-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
        }

        .card-info {
            padding: 1rem 1.2rem 1.4rem;
            text-align: center;
        }

        .card-info h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #e07a4f;
            margin-bottom: 0.3rem;
            font-family: 'Kalam', cursive;
        }

        .card-info p {
            font-size: 0.85rem;
            color: #c99a7a;
            font-style: italic;
            transition: all 0.3s ease;
        }
        .card:hover .card-info p {
            color: #ff8c5a;
            letter-spacing: 0.5px;
        }

        .footer-note {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 2px dashed #ffdbbc;
            font-size: 0.9rem;
            color: #d9a17e;
        }

        /* 模态框（大图） */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }

        .modal-img {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 32px;
            border: 5px solid #fff8f0;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 25px;
            right: 35px;
            font-size: 2.5rem;
            color: white;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            background: #ff8c5a;
        }

        /* 音乐控制按钮 */
        .music-control {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 55px;
            height: 55px;
            background-color: #ffccaa;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            transition: all 0.3s ease;
            border: 2px solid #fff5e8;
        }
        .music-control:hover {
            transform: scale(1.1);
            background-color: #ffb88c;
        }
        .music-control span {
            font-size: 28px;
            user-select: none;
        }

        /* 礼物盒遮罩层 */
        #giftOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fde8dd;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            transition: opacity 1s ease;
            backdrop-filter: blur(2px);
        }
        .gift-box {
            font-size: 80px;
            animation: bounce 1.2s infinite ease;
        }
        .gift-text {
            font-size: 26px;
            margin-top: 20px;
            background: #ffd9c4;
            padding: 10px 24px;
            border-radius: 60px;
            color: #b45a3b;
            font-weight: bold;
        }
        @keyframes bounce {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-12px); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 680px) {
            .hero h1 { font-size: 2.2rem; }
            .gallery { gap: 1.2rem; }
            .music-control { width: 45px; height: 45px; bottom: 15px; right: 15px; }
            .music-control span { font-size: 24px; }
            .gift-text { font-size: 20px; }
        }
    </style>
</head>
<body>

<!-- 礼物盒开场遮罩 -->
<div id="giftOverlay">
    <div class="gift-box">🎁</div>
    <div class="gift-text">点击打开生日礼物 💝</div>
</div>

<div class="container" id="mainContent" style="display: none;">
    <div class="hero">
        <div class="cake-icon">🎂🎈✨</div>
        <h1>生日快乐，亲爱的</h1>
        <div class="sub">每张照片都藏着一句悄悄话 · 只给你听</div>
        <div class="countdown" id="countdownBox">🎂 距离生日还有 -- 天 🎈</div>
    </div>

    <!-- 时间轴 -->
    <div class="timeline">
        <h3>✨ 我们的时光轴 ✨</h3>
        <div class="milestone">💑 第一次见面 · 2023.5.20</div>
        <div class="milestone">🎂 她的生日 · 每年最特别的一天</div>
        <div class="milestone">✈️ 第一次旅行 · 厦门 · 2024.3.12</div>
        <div class="milestone">📸 收集的第100张合影 · 未完待续</div>
    </div>

    <div class="gallery" id="gallery">
        <div class="loading-message">🎀 正在加载温暖瞬间 …</div>
    </div>

    <div class="footer-note">
        💖 点击照片放大 · 生日快乐，永远被爱包围 💖
    </div>
</div>

<!-- 音乐控制按钮（一开始隐藏，等礼物盒打开后显示） -->
<div id="musicBtn" class="music-control" style="display: none;">
    <span>🎵</span>
</div>
<audio id="bgMusic" loop preload="auto">
    <source src="birthday.mp3" type="audio/mpeg">
    你的浏览器不支持音频播放。
</audio>

<!-- 大图模态框 -->
<div id="imageModal" class="modal">
    <span class="modal-close">&times;</span>
    <img class="modal-img" id="modalImg" src="" alt="生日快乐">
</div>

<script>
    // ============================================
    // 用户配置区
    // ============================================
    const TOTAL_PHOTOS = 6;               // 你的照片数量 (1.jpg ~ 6.jpg)
    const HER_BIRTHDAY = { month: 5, day: 15 };  // 女朋友的生日（月, 日），例如5月15日，月份用0~11，这里5表示6月？注意：实际月份是从0开始的，但为了方便，写法采用实际数字再转换。
    // 为了方便：直接写 "YYYY-MM-DD" 格式的生日，我们取每年的该日期
    const BIRTHDAY_STR = "2026-06-15";    // 示例：6月15日，年份写今年或明年，程序会自动计算下一个生日
    
    // 情话库
    const LOVE_PHRASES = [
        "✨ 遇见你，是我此生最好的运气",
        "🌸 你的笑容，比蛋糕还甜",
        "🎈 和你在一起的每一天，都值得庆祝",
        "💖 你是我写不完的温柔",
        "🌙 星星是银河递给月亮的情书，你是世界赠予我的恩赐",
        "🍰 许个愿吧，我的愿望全都是你",
        "💕 你是我的今天，以及所有的明天",
        "🎂 又长大一岁，但我依然想把你宠成小朋友",
        "🌷 世界很大，幸福很小，有你就好",
        "❤️ 不管几岁，快乐万岁",
        "🎀 你是宇宙里最明亮的那颗糖",
        "🕯️ 每支蜡烛都代表一个我爱你",
        "✨ 你的名字，是我读过最短的情诗",
        "🥰 你像夏天的风，温柔了整个季节",
        "💐 你配得上世间所有美好，包括我"
    ];
    
    // 辅助：计算距离下一个生日的天数
    function getDaysUntilBirthday() {
        const today = new Date();
        const birthDate = new Date(BIRTHDAY_STR);
        let nextBirthday = new Date(today.getFullYear(), birthDate.getMonth(), birthDate.getDate());
        if (today > nextBirthday) {
            nextBirthday.setFullYear(today.getFullYear() + 1);
        }
        const diff = Math.ceil((nextBirthday - today) / (1000 * 60 * 60 * 24));
        return diff;
    }
    
    // 更新倒计时显示
    function updateCountdown() {
        const days = getDaysUntilBirthday();
        const countdownDiv = document.getElementById('countdownBox');
        if (countdownDiv) {
            if (days === 0) countdownDiv.innerHTML = "🎂 就是今天！生日快乐！ 🎉🎂";
            else if (days === 1) countdownDiv.innerHTML = "🎂 距离生日还有 1 天！ 💖";
            else countdownDiv.innerHTML = `🎂 距离下一个生日还有 ${days} 天 🎈`;
        }
    }
    
    // 根据照片索引获取情话
    function getLovePhrase(index) {
        return LOVE_PHRASES[index % LOVE_PHRASES.length];
    }
    
    // 生成照片列表
    function buildPhotoList() {
        const list = [];
        for (let i = 1; i <= TOTAL_PHOTOS; i++) {
            const phrase = getLovePhrase(i - 1);
            list.push({
                src: `images/${i}.jpg`,
                title: `🎂 生日快乐 · 第${i}枚时光`,
                desc: phrase
            });
        }
        return list;
    }
    
    let photos = [];
    let isMusicPlaying = false;
    let musicAllowed = false;  // 是否允许播放（点击礼物盒后置true）
    
    // 飘落爱心/花瓣 - 在礼物盒打开后启动
    let fallingInterval = null;
    function startFallingHearts() {
        if (fallingInterval) return;
        const body = document.body;
        const heartCount = 35;
        for (let i = 0; i < heartCount; i++) {
            let heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.top = '-20px';
            heart.style.fontSize = (Math.random() * 20 + 12) + 'px';
            heart.style.opacity = Math.random() * 0.6 + 0.2;
            heart.style.pointerEvents = 'none';
            heart.style.zIndex = 9999;
            heart.style.animation = `fall ${Math.random() * 5 + 5}s linear infinite`;
            heart.style.animationDelay = Math.random() * 10 + 's';
            body.appendChild(heart);
            
            // 可选：自动清理以防过多，但可以保留
            heart.addEventListener('animationend', () => { if(heart.parentNode) heart.remove(); });
        }
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                0% { transform: translateY(0) rotate(0deg); opacity: 1; }
                100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
            }
        `;
        if (!document.querySelector('#fallingStyle')) {
            style.id = 'fallingStyle';
            document.head.appendChild(style);
        }
    }
    
    // 烟花效果
    function fireConfetti() {
        canvasConfetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff88aa', '#ffaa66', '#ff6644'] });
        setTimeout(() => canvasConfetti({ particleCount: 100, spread: 100, origin: { y: 0.5, x: 0.2 }, startVelocity: 15 }), 200);
        setTimeout(() => canvasConfetti({ particleCount: 120, spread: 80, origin: { y: 0.7, x: 0.8 } }), 400);
    }
    
    // 渲染相册
    function renderGallery() {
        const galleryDiv = document.getElementById('gallery');
        if (!photos.length) {
            galleryDiv.innerHTML = '<div class="loading-message">🌸 还没放照片呢，请将照片放入 images 文件夹 (1.jpg,2.jpg...)</div>';
            return;
        }
        let html = '';
        for (let i = 0; i < photos.length; i++) {
            const p = photos[i];
            html += `
                <div class="card" data-index="${i}">
                    <img class="card-img" src="${p.src}" alt="${p.title}" loading="lazy"
                         onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20fill%3D%22%23ffe0c4%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%20fill%3D%22%23b45a3b%22%3E🎂%20加载失败%3C%2Ftext%3E%3C%2Fsvg%3E';">
                    <div class="card-info">
                        <h3>${escapeHtml(p.title)}</h3>
                        <p>${escapeHtml(p.desc)}</p>
                    </div>
                </div>
            `;
        }
        galleryDiv.innerHTML = html;
        
        // 绑定点击放大事件
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', (e) => {
                const idx = card.getAttribute('data-index');
                if (photos[idx]) {
                    openModal(photos[idx].src);
                    fireConfetti();  // 点击照片时放烟花
                }
            });
        });
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // 模态框逻辑
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImg');
    const closeModalBtn = document.querySelector('.modal-close');
    function openModal(src) {
        modal.style.display = 'flex';
        modalImg.src = src;
    }
    function closeModal() {
        modal.style.display = 'none';
        modalImg.src = '';
    }
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
    closeModalBtn.addEventListener('click', closeModal);
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.style.display === 'flex') closeModal();
    });
    
    // 音乐控制
    const musicBtn = document.getElementById('musicBtn');
    const bgMusic = document.getElementById('bgMusic');
    function toggleMusic() {
        if (!musicAllowed) return;
        if (isMusicPlaying) {
            bgMusic.pause();
            musicBtn.innerHTML = '<span>🔇</span>';
            isMusicPlaying = false;
        } else {
            bgMusic.play().then(() => {
                musicBtn.innerHTML = '<span>🎵</span>';
                isMusicPlaying = true;
            }).catch(err => {
                console.log("播放失败", err);
                alert("点击页面后再试一次～");
            });
        }
    }
    musicBtn.addEventListener('click', toggleMusic);
    
    // 开启整个网站（礼物盒点击后）
    function openGiftAndStart() {
        const overlay = document.getElementById('giftOverlay');
        const main = document.getElementById('mainContent');
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.display = 'none';
            main.style.display = 'block';
            musicBtn.style.display = 'flex';
            // 允许音乐播放
            musicAllowed = true;
            // 开始飘落爱心
            startFallingHearts();
            // 倒计时更新
            updateCountdown();
            // 可选自动播放音乐（受浏览器策略限制，需用户再次点击？因为刚刚点击了礼物盒，属于用户交互，可以尝试播放）
            bgMusic.play().then(() => {
                isMusicPlaying = true;
                musicBtn.innerHTML = '<span>🎵</span>';
            }).catch(() => {
                // 如果播放失败，保留按钮手动
                console.log("自动播放需手动");
            });
        }, 1000);
    }
    
    // 初始化数据
    function init() {
        photos = buildPhotoList();
        renderGallery();
        // 绑定礼物盒打开事件
        const giftDiv = document.getElementById('giftOverlay');
        giftDiv.addEventListener('click', openGiftAndStart);
    }
    
    init();
</script>
</body>
</html>
