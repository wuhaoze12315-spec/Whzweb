<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎂 生日快乐 · 专属相册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #fff5e6 0%, #ffe0c4 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 2rem 1rem;
            color: #b45a3b;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 头部生日主题 */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease;
        }

        .hero h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #ff8c5a, #ff6b3d);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .hero .sub {
            font-size: 1.2rem;
            color: #d98c5f;
            border-top: 2px solid #ffe0cc;
            display: inline-block;
            padding-top: 0.8rem;
            margin-top: 0.5rem;
        }

        .cake-icon {
            font-size: 2rem;
            margin: 1rem 0;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .card {
            background: rgba(255, 248, 240, 0.95);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.1);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            border: 1px solid #ffefdf;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            background: white;
            box-shadow: 0 28px 34px -14px rgba(0, 0, 0, 0.2);
        }

        .card-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
        }

        .card-info {
            padding: 1rem 1.2rem 1.4rem;
            text-align: center;
        }

        .card-info h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #e07a4f;
            margin-bottom: 0.3rem;
        }

        .card-info p {
            font-size: 0.85rem;
            color: #c99a7a;
        }

        .footer-note {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 2px dashed #ffdbbc;
            font-size: 0.9rem;
            color: #d9a17e;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }

        .modal-img {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 32px;
            border: 5px solid #fff8f0;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 25px;
            right: 35px;
            font-size: 2.5rem;
            color: white;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            background: #ff8c5a;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 680px) {
            .hero h1 { font-size: 2.2rem; }
            .gallery { gap: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <div class="cake-icon">🎂🎈✨</div>
        <h1>生日快乐，亲爱的</h1>
        <div class="sub">每一天都因为你而特别 · 今天尤其如此</div>
    </div>

    <div class="gallery" id="gallery">
        <div class="loading-message">🎀 正在加载温暖瞬间 …</div>
    </div>

    <div class="footer-note">
        💖 点击照片放大 · 祝你生日快乐，永远被爱包围 💖
    </div>
</div>

<div id="imageModal" class="modal">
    <span class="modal-close">&times;</span>
    <img class="modal-img" id="modalImg" src="" alt="生日快乐">
</div>

<script>
    // ============================================
    // ✨ 重要：请根据你实际上传的照片数量，修改下面的数字 ✨
    // 你目前在 images/ 文件夹里放了6张照片（1.jpg ~ 6.jpg），所以设为6
    // 以后每增加一张新照片，就把这个数字加1，重新上传 index.html 即可
    // ============================================
    const TOTAL_PHOTOS = 6;   // <--- 改成你实际的照片张数

    // 自动生成照片列表（不会有多余的空槽位）
    function buildPhotoList() {
        const list = [];
        for (let i = 1; i <= TOTAL_PHOTOS; i++) {
            list.push({
                src: `images/${i}.jpg`,
                title: `🎂 生日快乐 · 定格第 ${i} 刻`,
                desc: i % 2 === 0 ? '你的笑容像蜜糖' : '又甜又温暖的瞬间'
            });
        }
        return list;
    }

    const photos = buildPhotoList();

    function renderGallery() {
        const galleryDiv = document.getElementById('gallery');
        if (photos.length === 0) {
            galleryDiv.innerHTML = '<div class="loading-message">🌸 还没放照片呢，快把照片放进 images 文件夹吧 🌸</div>';
            return;
        }

        let html = '';
        for (let i = 0; i < photos.length; i++) {
            const p = photos[i];
            html += `
                <div class="card" data-index="${i}">
                    <img class="card-img" src="${p.src}" alt="${p.title}" loading="lazy"
                         onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20fill%3D%22%23ffe0c4%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%20fill%3D%22%23b45a3b%22%3E🎂%20照片加载失败%3C%2Ftext%3E%3C%2Fsvg%3E';">
                    <div class="card-info">
                        <h3>${escapeHtml(p.title)}</h3>
                        <p>${escapeHtml(p.desc)}</p>
                    </div>
                </div>
            `;
        }
        galleryDiv.innerHTML = html;

        // 绑定点击放大事件
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', () => {
                const idx = card.getAttribute('data-index');
                if (photos[idx]) openModal(photos[idx].src);
            });
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 模态框逻辑
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImg');
    const closeModalBtn = document.querySelector('.modal-close');

    function openModal(src) {
        modal.style.display = 'flex';
        modalImg.src = src;
    }
    function closeModal() {
        modal.style.display = 'none';
        modalImg.src = '';
    }
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
    closeModalBtn.addEventListener('click', closeModal);
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.style.display === 'flex') closeModal();
    });

    renderGallery();
</script>
</body>
</html>
